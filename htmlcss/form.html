<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form>
        <label for="name">Name:</label>
        <input type="text" placeholder="Full Name" id="name" name="name"><br><br>
        
        <label for="email">Email:</label>
        <input type="email" placeholder="example@gmail.com" id="email" name="email"><br><br>
        
        <label for="color">Favorite Color:</label><br>
        <input name="color" type="radio" value="red">Red
        <input name="color" type="radio" value="blue">Blue
        <input name="color" type="radio" value="green">Green
        <input name="color" type="radio" value="yellow">Yellow<br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" cols="50"
        placeholder="Write your message here..."></textarea><br><br>

        <label for="country">Country:</label>
        <select id="country" name="country">
            <option value="usa">USA</option>
            <option value="canada">Canada</option>
            <option value="uk">UK</option>
            <option value="australia">Australia</option>
        </select><br><br>

        <input type="submit" value="Submit">

        
    </form>
</body>
</html>
